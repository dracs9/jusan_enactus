experiment:
  name: oskin_stage1_plantvillage
  seed: 42
  stage: 1

data:
  root: data/plantvillage
  image_size: 224
  batch_size: 32
  num_workers: 4
  val_split: 0.15
  test_split: 0.10
  class_mapping_path: models/class_mapping.json

model:
  architecture: mobilenetv3_large_100
  pretrained: true
  dropout: 0.3
  freeze_backbone_epochs: 2

training:
  epochs: 50
  learning_rate: 0.001
  weight_decay: 0.0001
  optimizer: adamw
  scheduler: cosine
  warmup_epochs: 3
  early_stopping_patience: 10
  gradient_clip: 1.0

logging:
  checkpoint_dir: models/checkpoints
  best_model_path: models/best_model_stage1.pth
  log_interval: 10

augmentation:
  random_brightness_contrast: true
  gaussian_blur: true
  shadow_simulation: true
  perspective_distortion: true
  random_noise: true
  horizontal_flip: true
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]
