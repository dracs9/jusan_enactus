version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oskin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oskin_pass}
      POSTGRES_DB: ${POSTGRES_DB:-oskin_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oskin} -d ${POSTGRES_DB:-oskin_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-oskin}:${POSTGRES_PASSWORD:-oskin_pass}@db:5432/${POSTGRES_DB:-oskin_db}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - model_storage:/app/ml_models
    command: >
      sh -c "alembic upgrade head &&
             python -m app.db.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"

  adminer:
    image: adminer:4
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      - db
    environment:
      ADMINER_DEFAULT_SERVER: db
    profiles:
      - tools

volumes:
  pgdata:
    driver: local
  model_storage:
    driver: local
